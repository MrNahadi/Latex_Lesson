<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn LaTeX in 30 Minutes — An Interactive Crash Course</title>
    <meta name="description" content="A beautifully crafted interactive tutorial to learn LaTeX document preparation in 30 minutes. Master typesetting, mathematics, and document structure.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* ────────────────────────────────
           DESIGN TOKENS
           Editorial / Magazine Aesthetic
        ──────────────────────────────── */
        :root {
            --color-cream: #faf7f2;
            --color-cream-dark: #f0ebe3;
            --color-navy: #0d1b2a;
            --color-navy-light: #1b2d45;
            --color-navy-muted: #3a506b;
            --color-coral: #e07a5f;
            --color-coral-light: #f4a68e;
            --color-coral-dark: #c4563d;
            --color-ink: #1a1a2e;
            --color-ink-light: #4a4a5a;
            --color-rule: #d4c5b0;
            --color-rule-light: #e8ddd0;
            --color-paper: #ffffff;
            --color-code-bg: #1e1e2e;
            --color-code-text: #cdd6f4;

            --font-display: 'Cormorant Garamond', 'Georgia', serif;
            --font-body: 'Source Sans 3', 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', 'Consolas', monospace;

            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2.5rem;
            --space-2xl: 4rem;
            --space-3xl: 6rem;

            --sidebar-width: 260px;
            --sidebar-collapsed: 0px;
            --max-content: 820px;
            --transition-speed: 0.35s;
        }

        /* ────────────────────────────────
           RESET & BASE
        ──────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            font-size: 17px;
            line-height: 1.7;
            color: var(--color-ink);
            background-color: var(--color-cream);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ────────────────────────────────
           LAYOUT SHELL
        ──────────────────────────────── */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ────────────────────────────────
           SIDEBAR — Editorial Nav
        ──────────────────────────────── */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--color-navy);
            color: var(--color-cream);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
            transition: transform var(--transition-speed) cubic-bezier(0.22, 0.61, 0.36, 1),
                        width var(--transition-speed) cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        .sidebar.collapsed {
            transform: translateX(calc(-1 * var(--sidebar-width)));
        }

        /* ── Sidebar close button ── */
        .sidebar-collapse-btn {
            position: absolute;
            top: 16px;
            right: 14px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            padding: 4px;
            font-size: 0.9rem;
            line-height: 1;
            transition: color 0.2s ease;
            z-index: 2;
        }

        .sidebar-collapse-btn:hover {
            color: var(--color-coral-light);
        }

        /* ── Collapsed sidebar reopen button ── */
        .sidebar-reopen {
            position: fixed;
            top: 14px;
            left: 12px;
            z-index: 101;
            background: none;
            border: none;
            color: var(--color-navy-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            line-height: 1;
            transition: color 0.2s ease, opacity var(--transition-speed) ease;
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-reopen:hover {
            color: var(--color-coral);
        }

        .sidebar.collapsed ~ .sidebar-reopen {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar-header {
            position: relative;
            padding: var(--space-xl) var(--space-lg);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .sidebar-brand {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--color-cream);
            text-transform: uppercase;
            line-height: 1.3;
        }

        .sidebar-brand span {
            display: block;
            font-size: 0.7rem;
            font-family: var(--font-body);
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--color-coral-light);
            margin-top: var(--space-xs);
        }

        .sidebar-label {
            padding: var(--space-lg) var(--space-lg) var(--space-sm);
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding-bottom: var(--space-xl);
        }

        .sidebar-nav::-webkit-scrollbar { width: 3px; }
        .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        .nav-link {
            display: flex;
            align-items: baseline;
            gap: var(--space-sm);
            padding: 0.7rem var(--space-lg);
            text-decoration: none;
            color: rgba(255,255,255,0.55);
            font-size: 0.88rem;
            font-weight: 400;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: var(--font-body);
            line-height: 1.4;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--color-coral);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .nav-link:hover {
            color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.04);
        }

        .nav-link.active {
            color: var(--color-cream);
            font-weight: 600;
        }

        .nav-link.active::before {
            transform: scaleY(1);
        }

        .nav-number {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--color-coral);
            min-width: 1.5rem;
            opacity: 0.8;
        }

        .nav-link.active .nav-number {
            opacity: 1;
        }

        .nav-title {
            flex: 1;
        }

        /* ────────────────────────────────
           MOBILE NAV TOGGLE
        ──────────────────────────────── */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--color-navy);
            z-index: 200;
            align-items: center;
            padding: 0 var(--space-md);
            gap: var(--space-md);
        }

        .hamburger {
            background: none;
            border: none;
            color: var(--color-cream);
            font-size: 1.4rem;
            cursor: pointer;
            padding: var(--space-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }

        .mobile-title {
            font-family: var(--font-display);
            color: var(--color-cream);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        /* ────────────────────────────────
           MAIN CONTENT
        ──────────────────────────────── */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            transition: margin-left var(--transition-speed) cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        .sidebar.collapsed ~ .main-content {
            margin-left: 0;
        }

        .content-scroll {
            max-width: var(--max-content);
            margin: 0 auto;
            padding: var(--space-3xl) var(--space-xl) var(--space-2xl);
        }

        /* ────────────────────────────────
           LESSON HEADER — Editorial Style
        ──────────────────────────────── */
        .lesson-header {
            margin-bottom: var(--space-2xl);
            padding-bottom: var(--space-xl);
            border-bottom: 1px solid var(--color-rule);
        }

        .lesson-chapter {
            font-family: var(--font-body);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-coral);
            margin-bottom: var(--space-sm);
        }

        .lesson-title {
            font-family: var(--font-display);
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: 700;
            color: var(--color-navy);
            line-height: 1.15;
            margin-bottom: var(--space-lg);
            letter-spacing: -0.01em;
        }

        .lesson-intro {
            font-size: 1.15rem;
            font-weight: 300;
            color: var(--color-ink-light);
            line-height: 1.75;
            max-width: 640px;
        }

        /* ────────────────────────────────
           CONTENT BODY
        ──────────────────────────────── */
        .lesson-body h3 {
            font-family: var(--font-display);
            font-size: 1.7rem;
            font-weight: 600;
            color: var(--color-navy);
            margin-top: var(--space-xl);
            margin-bottom: var(--space-md);
        }

        .lesson-body h4 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--color-navy);
            margin-bottom: var(--space-md);
        }

        .lesson-body p {
            color: var(--color-ink-light);
            margin-bottom: var(--space-lg);
            line-height: 1.8;
        }

        .lesson-body strong {
            color: var(--color-ink);
            font-weight: 600;
        }

        .lesson-body em {
            font-style: italic;
        }

        .lesson-body code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: var(--color-cream-dark);
            color: var(--color-coral-dark);
            padding: 0.15em 0.45em;
            border-radius: 3px;
            border: 1px solid var(--color-rule-light);
        }

        .lesson-body ul, .lesson-body ol {
            padding-left: var(--space-lg);
            margin-bottom: var(--space-lg);
            color: var(--color-ink-light);
        }

        .lesson-body li {
            margin-bottom: var(--space-xs);
            padding-left: var(--space-xs);
        }

        .lesson-body li::marker {
            color: var(--color-coral);
        }

        /* ────────────────────────────────
           DROP CAP (first lesson paragraph)
        ──────────────────────────────── */
        .drop-cap::first-letter {
            font-family: var(--font-display);
            font-size: 3.8em;
            font-weight: 700;
            float: left;
            line-height: 0.75;
            margin-right: 0.08em;
            margin-top: 0.08em;
            color: var(--color-navy);
        }

        /* ────────────────────────────────
           CHART CARD
        ──────────────────────────────── */
        .chart-card {
            background: var(--color-paper);
            border: 1px solid var(--color-rule-light);
            padding: var(--space-xl);
            margin: var(--space-xl) 0;
        }

        .chart-card h4 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            color: var(--color-navy);
            margin-bottom: var(--space-lg);
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            height: 280px;
        }

        .chart-caption {
            font-size: 0.82rem;
            text-align: center;
            color: var(--color-ink-light);
            margin-top: var(--space-md);
            font-style: italic;
        }

        /* ────────────────────────────────
           CODE / OUTPUT PANELS
        ──────────────────────────────── */
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            margin-top: var(--space-xl);
            border: 1px solid var(--color-rule);
            overflow: hidden;
        }

        .panel {
            display: flex;
            flex-direction: column;
            min-height: 320px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem var(--space-lg);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-family: var(--font-body);
        }

        .panel-code .panel-header {
            background: #181825;
            color: rgba(255,255,255,0.45);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .panel-output .panel-header {
            background: var(--color-cream-dark);
            color: var(--color-ink-light);
            border-bottom: 1px solid var(--color-rule-light);
        }

        .panel-code .panel-body {
            flex: 1;
            background: var(--color-code-bg);
            color: var(--color-code-text);
            font-family: var(--font-mono);
            font-size: 0.82rem;
            line-height: 1.75;
            padding: var(--space-lg);
            overflow-x: auto;
            white-space: pre-wrap;
        }

        .panel-output .panel-body {
            flex: 1;
            background: var(--color-paper);
            font-family: 'Times New Roman', 'Georgia', serif;
            font-size: 1rem;
            line-height: 1.7;
            padding: var(--space-xl);
            color: #1a1a1a;
            border-left: 1px solid var(--color-rule);
        }

        /* ────────────────────────────────
           CHAPTER NAVIGATION
        ──────────────────────────────── */
        .chapter-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: var(--space-3xl);
            padding-top: var(--space-xl);
            border-top: 1px solid var(--color-rule);
        }

        .chapter-nav-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.88rem;
            color: var(--color-ink-light);
            transition: color 0.25s ease;
            padding: 0.4rem 0;
        }

        .chapter-nav-link:hover {
            color: var(--color-coral);
        }

        .chapter-nav-link .arrow {
            font-size: 1.05em;
            transition: transform 0.25s ease;
        }

        .chapter-nav-link:hover .arrow-left {
            transform: translateX(-3px);
        }

        .chapter-nav-link:hover .arrow-right {
            transform: translateX(3px);
        }

        .chapter-nav-hidden {
            visibility: hidden;
            pointer-events: none;
        }

        /* ────────────────────────────────
           BUTTONS & LINKS
        ──────────────────────────────── */
        .download-btn {
            display: inline-block;
            margin-top: var(--space-lg);
            margin-bottom: var(--space-md);
            padding: 0.85rem 1.8rem;
            background-color: var(--color-coral);
            color: var(--color-paper);
            text-decoration: none;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border-radius: 3px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .download-btn:hover {
            background-color: var(--color-coral-dark);
            transform: translateY(-2px);
        }

        /* ────────────────────────────────
           PAGE ENTRY ANIMATIONS
        ──────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anim-in {
            animation: fadeUp 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) backwards;
        }

        .anim-delay-1 { animation-delay: 0.08s; }
        .anim-delay-2 { animation-delay: 0.18s; }
        .anim-delay-3 { animation-delay: 0.3s; }
        .anim-delay-4 { animation-delay: 0.42s; }

        /* ────────────────────────────────
           RESPONSIVE
        ──────────────────────────────── */
        @media (max-width: 900px) {
            .panels {
                grid-template-columns: 1fr;
            }

            .panel-output .panel-body {
                border-left: none;
                border-top: 1px solid var(--color-rule);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.open {
                display: block;
            }

            .mobile-header {
                display: flex;
            }

            .sidebar-toggle {
                display: none;
            }

            .main-content {
                margin-left: 0;
            }

            .content-scroll {
                padding: calc(56px + var(--space-xl)) var(--space-md) var(--space-xl);
            }

            .lesson-title {
                font-size: 2rem;
            }

            .chart-container {
                height: 220px;
            }

            .chapter-nav {
                gap: var(--space-md);
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">

        <!-- ═══ MOBILE HEADER ═══ -->
        <div class="mobile-header" id="mobile-header">
            <button class="hamburger" id="hamburger-btn" aria-label="Open navigation">☰</button>
            <span class="mobile-title">LaTeX in 30 Min</span>
        </div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- ═══ SIDEBAR ═══ -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    Learn LaTeX<br>in 30 Minutes
                    <span>Interactive Edition</span>
                </div>
                <button class="sidebar-collapse-btn" id="sidebar-collapse" aria-label="Hide sidebar" title="Hide sidebar">✕</button>
            </div>
            <div class="sidebar-label">Chapters</div>
            <nav class="sidebar-nav" id="nav-container"></nav>
        </aside>
        <button class="sidebar-reopen" id="sidebar-reopen" aria-label="Show sidebar" title="Show sidebar">☰</button>

        <!-- ═══ MAIN ═══ -->
        <main class="main-content" id="main-content">
            <div class="content-scroll" id="content-scroll"></div>
        </main>

    </div>

    <script>
        /* ────────────────────────────────
           LESSON DATA
        ──────────────────────────────── */
        const appData = [
            {
                id: 'intro',
                num: '01',
                title: 'Introduction & The "Why"',
                introText: 'Welcome to the interactive LaTeX crash course! This section explains the fundamental philosophy behind LaTeX and why it is the standard for scientific and academic publishing.',
                content: `
                    <div class="lesson-body">
                        <h3>WYSIWYG vs WYSIWYM</h3>
                        <p class="drop-cap">
                            Traditional word processors like Microsoft Word or Google Docs operate on a <strong>WYSIWYG</strong> (What You See Is What You Get) principle. You format the text visually as you type.
                        </p>
                        <p>
                            LaTeX, however, is a document preparation system based on <strong>WYSIWYM</strong> (What You See Is What You Mean). You write plain text interspersed with commands that describe the <em>structure</em> and <em>meaning</em> of the content. A compiler then reads this code and generates a beautifully typeset PDF.
                        </p>
                        <p>
                            This separation of content and presentation allows authors to focus purely on writing, letting LaTeX handle the complex typesetting rules, margins, and layout.
                        </p>
                    </div>

                    <div class="chart-card anim-in anim-delay-3">
                        <h4>Time Allocation: Word Processors vs LaTeX</h4>
                        <div class="chart-container">
                            <canvas id="introChart"></canvas>
                        </div>
                        <p class="chart-caption">Estimated time spent on formatting as document complexity increases.</p>
                    </div>
                `,
                hasChart: true
            },
            {
                id: 'first-doc',
                num: '02',
                title: 'Your First Document',
                introText: 'Let\'s create the absolute minimum code required to generate a LaTeX document. Every LaTeX document has a specific skeleton structure.',
                content: `
                    <div class="lesson-body">
                        <p class="drop-cap">
                            A LaTeX document consists of two main parts: the <strong>preamble</strong> and the <strong>document body</strong>.
                            The preamble is everything before <code>\\begin{document}</code>. It defines the document class and loads packages. The body contains your actual text.
                        </p>
                    </div>
                `,
                code: `\\documentclass{article}

% This is a comment. It is ignored by the compiler.
% The preamble goes here.

\\begin{document}

Hello, World! Welcome to LaTeX.

\\end{document}`,
                output: `<div style="margin-top:2rem">Hello, World! Welcome to LaTeX.</div>`,
                hasChart: false
            },
            {
                id: 'preamble',
                num: '03',
                title: 'Title, Author & Date',
                introText: 'Now let\'s add metadata to our document. LaTeX automatically formats title pages beautifully based on just a few commands provided in the preamble.',
                content: `
                    <div class="lesson-body">
                        <p class="drop-cap">
                            To add a title, author, and date, you declare them in the preamble. Then, inside the document body, you use the <code>\\maketitle</code> command to instruct LaTeX to print them.
                        </p>
                    </div>
                `,
                code: `\\documentclass{article}

\\title{My First Interactive Document}
\\author{Jane Doe}
\\date{August 2024}

\\begin{document}

\\maketitle

Here begins the actual content of the
amazing document we are writing today.

\\end{document}`,
                output: `
                    <div style="text-align:center;margin-top:2.5rem;margin-bottom:2rem">
                        <h1 style="font-size:1.6rem;font-weight:bold;margin-bottom:0.3rem">My First Interactive Document</h1>
                        <p style="margin-bottom:0.15rem">Jane Doe</p>
                        <p>August 2024</p>
                    </div>
                    <p style="text-indent:2em;text-align:justify">
                        Here begins the actual content of the amazing document we are writing today.
                    </p>
                `,
                hasChart: false
            },
            {
                id: 'formatting',
                num: '04',
                title: 'Formatting Text',
                introText: 'Learn the basic commands for bold, italics, and underlining. Notice how commands wrap around the text using curly braces.',
                content: `
                    <div class="lesson-body">
                        <p class="drop-cap">
                            In LaTeX, formatting is applied via commands that take the text as an argument inside curly braces <code>{}</code>.
                        </p>
                        <ul>

        /* ────────────────────────────────
           STATE
        ──────────────────────────────── */
        let currentLessonId = 'intro';
        let chartInstance = null;

        /* ────────────────────────────────
           SIDEBAR NAV
        ──────────────────────────────── */
        function initNav() {
            const nav = document.getElementById('nav-container');
            nav.innerHTML = '';

            appData.forEach(lesson => {
                const btn = document.createElement('button');
                btn.className = `nav-link${lesson.id === currentLessonId ? ' active' : ''}`;
                btn.innerHTML = `<span class="nav-number">${lesson.num}</span><span class="nav-title">${lesson.title}</span>`;
                btn.addEventListener('click', () => {
                    currentLessonId = lesson.id;
                    updateApp();
                    closeMobileNav();
                });
                nav.appendChild(btn);
            });
        }

        /* ────────────────────────────────
           RENDER CONTENT
        ──────────────────────────────── */
        function renderContent() {
            const container = document.getElementById('content-scroll');
            const lesson = appData.find(l => l.id === currentLessonId);
            if (!lesson) return;

            let html = `
                <div class="lesson-header anim-in anim-delay-1">
                    <div class="lesson-chapter">Chapter ${lesson.num}</div>
                    <h1 class="lesson-title">${lesson.title}</h1>
                    <p class="lesson-intro">${lesson.introText}</p>
                </div>

                <div class="anim-in anim-delay-2">
                    ${lesson.content}
                </div>
            `;

            if (lesson.code && lesson.output) {
                html += `
                    <div class="panels anim-in anim-delay-3">
                        <div class="panel panel-code">
                            <div class="panel-header">
                                <span>main.tex</span>
                                <span>Source</span>
                            </div>
                            <div class="panel-body">${lesson.code}</div>
                        </div>
                        <div class="panel panel-output">
                            <div class="panel-header">
                                <span>Preview</span>
                                <span>Compiled</span>
                            </div>
                            <div class="panel-body">${lesson.output}</div>
                        </div>
                    </div>
                `;
            }

            const idx = appData.findIndex(l => l.id === currentLessonId);
            const prevLesson = idx > 0 ? appData[idx - 1] : null;
            const nextLesson = idx < appData.length - 1 ? appData[idx + 1] : null;

            html += `
                <div class="chapter-nav anim-in anim-delay-4">
                    <button class="chapter-nav-link ${!prevLesson ? 'chapter-nav-hidden' : ''}" id="prevBtn">
                        <span class="arrow arrow-left">←</span> ${prevLesson ? prevLesson.title : ''}
                    </button>
                    <button class="chapter-nav-link ${!nextLesson ? 'chapter-nav-hidden' : ''}" id="nextBtn">
                        ${nextLesson ? nextLesson.title : ''} <span class="arrow arrow-right">→</span>
                    </button>
                </div>
            `;

            container.innerHTML = html;

            /* Wire nav buttons */
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            if (prevLesson) {
                prevBtn.addEventListener('click', () => {
                    currentLessonId = prevLesson.id;
                    updateApp();
                });
            }
            if (nextLesson) {
                nextBtn.addEventListener('click', () => {
                    currentLessonId = nextLesson.id;
                    updateApp();
                });
            }

            if (lesson.hasChart) renderChart();
        }

        /* ────────────────────────────────
           CHART
        ──────────────────────────────── */
        function renderChart() {
            const ctx = document.getElementById('introChart');
            if (!ctx) return;
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Short Document', 'Medium Document', 'Complex Thesis'],
                    datasets: [
                        {
                            label: 'Word Processor',
                            data: [10, 40, 80],
                            backgroundColor: 'rgba(224, 122, 95, 0.75)',
                            borderColor: 'rgb(224, 122, 95)',
                            borderWidth: 1,
                            borderRadius: 2
                        },
                        {
                            label: 'LaTeX',
                            data: [30, 35, 40],
                            backgroundColor: 'rgba(13, 27, 42, 0.7)',
                            borderColor: 'rgb(13, 27, 42)',
                            borderWidth: 1,
                            borderRadius: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                font: { family: "'Source Sans 3', sans-serif", size: 13 },
                                padding: 16
                            }
                        },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Effort / Time (Arbitrary Units)',
                                font: { family: "'Source Sans 3', sans-serif", size: 12, weight: 300 }
                            },
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            ticks: { font: { family: "'Source Sans 3', sans-serif" } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { font: { family: "'Source Sans 3', sans-serif" } }
                        }
                    }
                }
            });
        }

        /* ────────────────────────────────
           MOBILE NAV
        ──────────────────────────────── */
        function openMobileNav() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebar-overlay').classList.add('open');
        }

        function closeMobileNav() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('open');
        }

        document.getElementById('hamburger-btn').addEventListener('click', openMobileNav);
        document.getElementById('sidebar-overlay').addEventListener('click', closeMobileNav);

        /* ────────────────────────────────
           SIDEBAR TOGGLE (Desktop)
        ──────────────────────────────── */
        document.getElementById('sidebar-collapse').addEventListener('click', () => {
            document.getElementById('sidebar').classList.add('collapsed');
        });

        document.getElementById('sidebar-reopen').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('collapsed');
        });

        /* ────────────────────────────────
           UPDATE
        ──────────────────────────────── */
        function updateApp() {
            initNav();
            renderContent();
            document.getElementById('main-content').scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('DOMContentLoaded', updateApp);
    </script>
